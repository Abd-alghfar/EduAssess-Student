name: Build CodeKey for Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build CodeKey (Windows)
        run: flutter build windows --release

      - name: Create Output folder
        run: mkdir Output

      - name: Build CodeKey Installer
        run: iscc installer.iss

      - name: Upload CodeKey Windows build
        uses: actions/upload-artifact@v4
        with:
          name: CodeKey-Windows
          path: build/windows/x64/runner/Release

      - name: Upload CodeKey Installer
        uses: actions/upload-artifact@v4
        with:
          name: CodeKey-Installer
          path: Output/CodeKeySetup.exe
